name: Java CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres_db:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: library_int
          POSTGRES_USER: int_user
          POSTGRES_PASSWORD: int_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and run tests
      env:
        SPRING_PROFILES_ACTIVE: int
        POSTGRES_HOST: localhost
        POSTGRES_DB_NAME: library_int
        POSTGRES_USER: int_user
        POSTGRES_PASSWORD: int_password
      run: mvn clean verify

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 7