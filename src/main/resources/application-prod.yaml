spring:
  datasource:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB_NAME}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: LibraryProdHikariPool
      maximum-pool-size: 20
      minimum-idle: 20
      connection-timeout: 3000
      idle-timeout: 0
      max-lifetime: 1800000
      keepalive-time: 30000
      leak-detection-threshold: 5000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc.fetch_size: 100
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.lob.non_contextual_creation: true