spring:
  datasource:
    username: "sa"
    password: ""
    url: "jdbc:h2:./library"
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2console/
      settings:
        web-allow-others: true

  liquibase:
    enabled: false