spring:
  application:
    name: library

  datasource:
    username: "sa"
    password: ""
    url: "jdbc:h2:./library"
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2console/
      settings:
        web-allow-others: true